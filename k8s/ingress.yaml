# Requer controlador Ingress (nginx-ingress, traefik, etc.)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agro-ingress
  namespace: agro-saas
  annotations:
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
    - host: agro.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-api
                port:
                  number: 80
    # Multi-tenant: adicione hosts por fazenda ou use um Ingress com hostname *.agro.local
    # (conforme o controlador suportar) e o mesmo backend django-api.
  # tls:
  #   - hosts:
  #       - agro.local
  #     secretName: agro-tls
