services:
  db:
    image: postgres:16
    container_name: agro_postgres
    restart: always
    environment:
      POSTGRES_DB: agrodb
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: agro_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agro_user -d agrodb"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: agro_api
    command: >
      sh -c "
      python manage.py ensure_postgres_database &&
      python manage.py migrate_schemas --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: agrodb
      DB_USER: agro_user
      DB_PASSWORD: agro_pass
      DB_HOST: db
      DB_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: chave-secreta-longa
      ALLOWED_HOSTS: "localhost,127.0.0.1,.localhost,agro.local,.agro.local"
      TENANT_SUBDOMAIN_BASE: localhost
    restart: always

volumes:
  postgres_data:
